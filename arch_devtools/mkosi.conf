[Distribution]
Distribution=arch
Architecture=x86-64

[Output]
# This is the magic directive! It tells mkosi NOT to build a bootable disk,
# but to build a raw, compressed system extension image (usually squashfs/erofs).
Format=sysext
Output=devtools.raw

# THESE TWO LINES ARE CRITICAL
# They must perfectly match the ID and Version of your Base OS build!
ImageId=arch
ImageVersion=2026.06.18

[Content]
# We only install the exact packages we want overlaid onto the host.
# Notice we DO NOT include the kernel, systemd, or base system here!
Packages=
    git
    vim
    python
    base-devel
    htop
    wget
    curl
